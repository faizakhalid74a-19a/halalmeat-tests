name: Halaleat UI/UX & Functionality Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI/UX Tests
        run: npx playwright test tests/ui-ux.spec.js --reporter=html
        continue-on-error: true

      - name: Run Product Tests
        run: npx playwright test tests/products.spec.js --reporter=html
        continue-on-error: true

      - name: Run Functionality Tests
        run: npx playwright test tests/functionality.spec.js --reporter=html
        continue-on-error: true

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: test-results/
          retention-days: 30
